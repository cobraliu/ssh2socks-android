name: desktop-gui

# Builds the Fyne desktop client on all three desktop OSes and uploads a binary
# artifact per OS. On a v* tag it also attaches the binaries to a GitHub Release.
#
# NOTE: committing this file requires a token with the `workflow` scope. If your
# push is rejected for that reason, add this workflow through the GitHub web UI.

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            artifact: ssh2socks-desktop-linux-amd64
            bin: ssh2socks-desktop
          - os: macos-14          # Apple Silicon runner → native arm64
            goos: darwin
            artifact: ssh2socks-desktop-macos-arm64
            bin: ssh2socks-desktop
          - os: macos-13          # Intel runner → native amd64
            goos: darwin
            artifact: ssh2socks-desktop-macos-amd64
            bin: ssh2socks-desktop
          - os: windows-latest
            goos: windows
            artifact: ssh2socks-desktop-windows-amd64.exe
            bin: ssh2socks-desktop.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"

      - name: Linux GL/X11/Wayland dev headers
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols

      - name: Build
        working-directory: desktop
        env:
          CGO_ENABLED: "1"
          GOFLAGS: ""
        run: go build -o "${{ matrix.bin }}" .

      - name: Rename for release
        working-directory: desktop
        shell: bash
        run: cp "${{ matrix.bin }}" "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: desktop/${{ matrix.artifact }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/${{ matrix.artifact }}
          generate_release_notes: true
